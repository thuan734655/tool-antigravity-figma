<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 12px;
      background-color: #2c2c2c;
      color: #e0e0e0;
      font-size: 11px;
    }
    .status-container {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
    }
    .indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      background-color: #ff4d4d;
      box-shadow: 0 0 4px #ff4d4d;
    }
    .connected .indicator {
      background-color: #00e676;
      box-shadow: 0 0 4px #00e676;
    }
    .status-text {
      font-weight: 500;
    }
    .log-container {
      background: #1e1e1e;
      border-radius: 4px;
      padding: 6px;
      height: 50px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 10px;
      color: #a8a8a8;
      border: 1px solid #3c3c3c;
    }
    .log-entry {
      margin-bottom: 2px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div id="statusWrapper" class="status-container">
    <div class="indicator"></div>
    <span id="statusLabel" class="status-text">Disconnected</span>
  </div>
  <div class="log-container" id="logContainer">
    <div class="log-entry">Initializing connection...</div>
  </div>

  <script>
    const statusWrapper = document.getElementById('statusWrapper');
    const statusLabel = document.getElementById('statusLabel');
    const logContainer = document.getElementById('logContainer');

    function log(message) {
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      logContainer.appendChild(entry);
      logContainer.scrollTop = logContainer.scrollHeight;
    }

    let socket = null;
    
    function connect() {
      log("Connecting to ws://localhost:8999...");
      socket = new WebSocket("ws://localhost:8999");

      socket.onopen = () => {
        statusWrapper.className = "status-container connected";
        statusLabel.textContent = "Connected (Port 8999)";
        log("Connected to Bridge Server!");
      };

      socket.onmessage = (event) => {
        try {
          const message = JSON.parse(event.data);
          log(`Received command: ${message.action} [${message.id}]`);
          
          // Forward the command to the main Figma thread (code.js)
          parent.postMessage({ pluginMessage: message }, '*');
        } catch (err) {
          log("Error parsing incoming message: " + err.message);
        }
      };

      socket.onclose = () => {
        statusWrapper.className = "status-container";
        statusLabel.textContent = "Disconnected";
        log("Connection closed. Retrying in 3 seconds...");
        setTimeout(connect, 3000);
      };

      socket.onerror = (error) => {
        log("WebSocket error occurred.");
      };
    }

    // Listen for responses back from the main Figma thread (code.js)
    window.onmessage = (event) => {
      const message = event.data.pluginMessage;
      if (message && socket && socket.readyState === WebSocket.OPEN) {
        log(`Sending response back: [${message.id}] Success=${message.success}`);
        socket.send(JSON.stringify(message));
      }
    };

    // Start WebSocket connection
    connect();
  </script>
</body>
</html>
